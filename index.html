<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium MP3 Converter</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #111827; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .ad-container { width: 100%; max-width: 400px; text-align: center; margin-bottom: 15px; }
        .converter-card { background: #1f2937; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 15px; border-radius: 10px; border: none; margin-bottom: 15px; }
        button { width: 100%; padding: 15px; background: #38bdf8; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #111; }
        .result-section { margin-top: 20px; display: none; }
        .download-btn { display: block; background: #22c55e; color: white; padding: 15px; text-decoration: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Top Ad -->
    <div class="ad-container">
        <script async="async" data-cfasync="false" src="https://pl30387409.effectivecpmnetwork.com/4dcbb7b5a73a411b6b6592b6d949bb11/invoke.js"></script>
        <div id="container-4dcbb7b5a73a411b6b6592b6d949bb11"></div>
    </div>

    <div class="converter-card">
        <h1>🎵 MP3 Converter</h1>
        <input type="text" id="videoUrl" placeholder="Paste YouTube link...">
        <button id="convertBtn" onclick="startConversion()">Convert Now ⚡</button>

        <div id="loader" style="display:none; margin-top:15px; color: #38bdf8;">Processing...</div>

        <!-- Yahan Download ka button hai, iske aas-paas koi AD nahi hai -->
        <div class="result-section" id="resultSection">
            <a href="#" id="downloadLink" class="download-btn" target="_blank">Download MP3</a>
        </div>
    </div>

    <!-- Bottom Ad -->
    <div class="ad-container" style="margin-top: 20px;">
        <script async="async" data-cfasync="false" src="https://pl30387409.effectivecpmnetwork.com/4dcbb7b5a73a411b6b6592b6d949bb11/invoke.js"></script>
        <div id="container-4dcbb7b5a73a411b6b6592b6d949bb11"></div>
    </div>

    <script>
        function startConversion() {
            const urlInput = document.getElementById("videoUrl").value.trim();
            if (!urlInput) return alert("Enter URL");
            
            const resultSection = document.getElementById("resultSection");
            const downloadLink = document.getElementById("downloadLink");

            let videoId = "";
            try {
                const url = new URL(urlInput);
                if (url.hostname.includes("youtube.com")) videoId = url.searchParams.get("v");
                else if (url.hostname.includes("youtu.be")) videoId = url.pathname.slice(1);
            } catch(e) {}

            if (videoId) {
                downloadLink.href = `https://button.yt2mp3.cc/?url=https://www.youtube.com/watch?v=${videoId}`;
                resultSection.style.display = "block";
            } else {
                alert("Invalid URL");
            }
        }
    </script>
</body>
</html>
